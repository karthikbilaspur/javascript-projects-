<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Counter App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Dynamic Counter App</h1>
      
      <!-- Controls to add new counters -->
      <div class="controls">
        <button class="btn add-counter">+ Add Counter</button>
        <button class="btn clear-all">Clear All Data</button>
      </div>

      <!-- Counters container -->
      <div class="counters-wrapper"></div>
    </main>

    <!-- Template for new counters -->
    <template id="counter-template">
      <div class="container counter">
        <button class="delete-counter">×</button>
        <h2 class="counter-title">Counter</h2>
        <span class="value">0</span>
        
        <div class="settings">
          <label>
            Step: <input type="number" class="step-input" value="1" min="1">
          </label>
          <label>
            Min: <input type="number" class="min-input" placeholder="none">
          </label>
          <label>
            Max: <input type="number" class="max-input" placeholder="none">
          </label>
        </div>

        <div class="button-container">
          <button class="btn decrease">decrease</button>
          <button class="btn reset">reset</button>
          <button class="btn increase">increase</button>
        </div>
      </div>
    </template>
    
    <script src="script.js"></script>
  </body>
</html>
