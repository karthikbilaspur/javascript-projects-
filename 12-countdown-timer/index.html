<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Countdown Timer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>Pro Countdown</h1>
      <div class="header-controls">
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">🌙</button>
        <button id="add-tab-btn" class="icon-btn" title="New countdown">+</button>
      </div>
    </header>

    <!-- Tab bar for multiple countdowns -->
    <div class="tab-bar" id="tab-bar"></div>

    <!-- Timer containers will be injected here -->
    <div id="timers-wrapper"></div>
  </div>

  <!-- Template for each countdown -->
  <template id="timer-template">
    <div class="timer-container" data-id="">
      <div class="timer-header-row">
        <input type="text" class="timer-title" placeholder="Untitled Event" value="Product Launch">
        <button class="delete-tab-btn" title="Delete countdown">×</button>
      </div>

      <div class="countdown-display">
        <div class="time-block">
          <span class="time-value days">00</span>
          <span class="time-label">Days</span>
        </div>
        <div class="separator">:</div>
        <div class="time-block">
          <span class="time-value hours">00</span>
          <span class="time-label">Hours</span>
        </div>
        <div class="separator">:</div>
        <div class="time-block">
          <span class="time-value minutes">00</span>
          <span class="time-label">Minutes</span>
        </div>
        <div class="separator">:</div>
        <div class="time-block">
          <span class="time-value seconds">00</span>
          <span class="time-label">Seconds</span>
        </div>
      </div>

      <div class="status-message">Set a target date to begin</div>

      <div class="controls">
        <div class="input-group">
          <label>Target Date & Time</label>
          <input type="datetime-local" class="date-input">
        </div>
        
        <div class="button-group">
          <button class="btn primary start-btn">Start</button>
          <button class="btn pause-btn" disabled>Pause</button>
          <button class="btn danger reset-btn">Reset</button>
        </div>

        <div class="extra-actions">
          <button class="btn secondary share-btn">🔗 Share Link</button>
          <button class="btn secondary gcal-btn">📅 Add to Google Calendar</button>
          <button class="btn secondary notify-btn">🔔 Enable Notifications</button>
        </div>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
